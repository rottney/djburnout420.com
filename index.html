<!DOCTYPE html>
<html lang="en">
<head>
<title>DJ BURNOUT</title>
<meta charset="utf-8">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  padding: 10px;
  background: #f1f1f1;
}

/* I think refactor this.. */
img {
  width: 100%;
  height: auto;
}

/* Header/Blog Title */
.header {
  padding: 30px;
  text-align: center;
  background: white;
}

.header h1 {
  font-size: 50px;
}

/* Style the top navigation bar */
.topnav {
  overflow: hidden;
  background-color: #333;
  position: -webkit-sticky; /* Safari */
  position: sticky;
  top: 0;
}

/* Style the topnav links */
.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

/* Change color on hover */
.topnav a:hover {
  background-color: #ddd;
  color: black;
}

/* I have no idea */
.row {

}

/* Changed from template; only one column */
.column {   
  float: left;
  width: 100%;
}

/* Fake image */
.fakeimg {
  background-color: #aaa;
  width: 100%;
  padding: 20px;
}

/* Add a card effect for articles */
.card {
  background-color: white;
  padding: 20px;
  margin-top: 20px;
}

/* Clear floats after the columns */
.row::after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
  margin-top: 20px;
  position: sticky;
  bottom: 0;
}

/* Responsive layout - when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */
@media screen and (max-width: 400px) {
  .topnav a {
    float: none;
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="header">
  <!-- <h1>DJ BURNOUT</h1>
  <p>Background image is to go here</p> -->
  <img src="images/DJ BURNOUT Logo.jpg" alt="DJ BURNOUT" width=1200>
</div>

<div class="topnav">
  <a href="#about">About</a>
  <a href="#music">Music</a>
  <a href="#shows">Shows</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</div>

<div class="row">
  <div class="column">
    <div class="card" id="about">
      <h2>ABOUT ME</h2>
      <div class="fakeimg" style="height:200px;">Image</div>
      <p>I am a DJ, and I am a burnout</p>
    </div>
    <div class="card" id="music">
      <h2>MUSIC</h2>
      <div class="fakeimg" style="height:200px;">Image</div>
      <p>A song..</p>
      <p>another song..</p>
    </div>
    <div class="card" id="shows">
      <h2>SHOWS</h2>
      <div class="fakeimg" style="height:100px;">Image</div>
      <p>Details about shows</p>
    </div>
    <div class="card" id="gallery">
      <h2>GALLERY</h2>
      <div class="fakeimg"><p>A picture</p></div>
      <div class="fakeimg"><p>Another picture</p></div>
      <div class="fakeimg"><p>but an actual gallery..</p></div>
    </div>
    <div class="card" id="contact">
      <h2>CONTACT</h2>
      <p>Contact form will go here</p>
    </div>
  </div>
</div>

<div class="footer">
  <h2>Footer, will contain social links</h2>
</div>

</body>
</html>
